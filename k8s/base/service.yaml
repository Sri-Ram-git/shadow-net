apiVersion: v1
kind: Service
metadata:
  name: shadownet-api
  namespace: shadownet
  labels:
    app.kubernetes.io/name: shadownet-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: shadownet-api
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: shadownet
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: ai
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: ollama
