services:
  - type: web
    name: shadownet-api
    env: docker
    repo: https://github.com/Sri-Ram-git/shadow-net
    branch: main
    dockerfilePath: Dockerfile
    healthCheckPath: /api/health/live
    envVars:
      - key: SHADOWNET_DEMO_MODE
        value: "true"
      - key: SHADOWNET_CORS_ORIGINS
        value: "https://shadow-nett.vercel.app"
      - key: SHADOWNET_LOG_LEVEL
        value: "INFO"
