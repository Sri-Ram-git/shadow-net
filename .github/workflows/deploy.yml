name: ShadowNet CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  backend-check:
    name: Backend Syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install poetry
      - run: poetry config virtualenvs.create false
      - run: poetry install --no-interaction --no-ansi
      - run: python -m py_compile app/main.py

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t shadownet-api .

  deploy-railway:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        run: npx @railway/cli up --service shadownet-api --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-vercel:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  verify:
    name: Verify Health
    runs-on: ubuntu-latest
    needs: [deploy-railway, deploy-vercel]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for deployment
        run: sleep 30
      - name: Check Railway health
        run: |
          RAILWAY_URL=$(curl -s https://api.railway.app/v1/project/$(echo ${{ secrets.RAILWAY_TOKEN }} | cut -d'-' -f1)/service 2>/dev/null || echo "")
          echo "Backend health check would go here once URL is known"
      - name: Check Frontend loads
        run: |
          echo "Frontend URL will be printed by Vercel deploy step"
