version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shadownet-api
    ports:
      - "8000:8000"
    volumes:
      - shadownet-data:/app/data
    environment:
      - SHADOWNET_DATABASE_URL=sqlite+aiosqlite:////app/data/shadownet.db
      - SHADOWNET_OLLAMA_ENDPOINT=http://ollama:11434
      - SHADOWNET_CORS_ORIGINS=*
      - SHADOWNET_LOG_LEVEL=INFO
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - shadownet

  ollama:
    image: ollama/ollama:latest
    container_name: shadownet-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - shadownet

volumes:
  shadownet-data:
  ollama-models:

networks:
  shadownet:
    driver: bridge
